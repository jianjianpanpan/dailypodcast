name: Daily Podcast

on:
  schedule:
    # 06:00 Asia/Shanghai = 22:00 UTC on the previous day.
    - cron: "0 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install audio tools
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate daily podcast
        run: python scripts/generate_daily_podcast.py

      - name: Commit generated episode
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Generate daily podcast"
          file_pattern: "index.html episodes/*.mp3 data/*.json"
